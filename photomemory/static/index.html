<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Photo Memory</title>
<style>
  :root{--bg:#0f1115;--panel:#181b22;--panel2:#21252e;--line:#2b303b;--fg:#e9ecf1;
        --muted:#9aa3b2;--accent:#6aa9ff;--accent2:#7ee0a2;--danger:#ff6a6a;}
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 "Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--fg)}
  header{display:flex;align-items:center;gap:16px;padding:14px 20px;background:var(--panel);
         border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
  header h1{font-size:18px;margin:0;font-weight:600}
  header .stat{color:var(--muted);font-size:12px}
  nav{display:flex;gap:6px;margin-left:auto}
  nav button{background:var(--panel2);color:var(--fg);border:1px solid var(--line);
             padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}
  nav button.active{background:var(--accent);color:#06121f;border-color:var(--accent);font-weight:600}
  main{padding:20px;max-width:1200px;margin:0 auto}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  select,input[type=number]{background:var(--panel2);color:var(--fg);border:1px solid var(--line);
             padding:7px 10px;border-radius:8px;font-size:13px}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;cursor:pointer;
        transition:border-color .15s,transform .05s}
  .card:hover{border-color:var(--accent)}
  .card h3{margin:0 0 4px;font-size:15px}
  .card .meta{color:var(--muted);font-size:12px}
  .card .hl{margin-top:8px;font-size:12px;color:#c7cedb}
  .btn{background:var(--accent);color:#06121f;border:none;padding:9px 16px;border-radius:9px;
       cursor:pointer;font-weight:600;font-size:13px}
  .btn.ghost{background:var(--panel2);color:var(--fg);border:1px solid var(--line);font-weight:500}
  .btn:disabled{opacity:.5;cursor:default}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:14px}
  .tile{position:relative;border-radius:10px;overflow:hidden;background:#000;aspect-ratio:4/3;
        border:2px solid transparent}
  .tile img{width:100%;height:100%;object-fit:cover;display:block;opacity:.55;transition:opacity .15s}
  .tile.on{border-color:var(--accent2)}
  .tile.on img{opacity:1}
  .tile .chk{position:absolute;top:6px;left:6px;width:20px;height:20px;border-radius:5px;
       background:rgba(0,0,0,.45);border:2px solid #fff;display:flex;align-items:center;justify-content:center;
       font-size:14px;font-weight:700;color:#06121f}
  .tile.on .chk{background:var(--accent2);border-color:var(--accent2)}
  .tile.on .chk::after{content:'✓'}
  .tile .ppl{position:absolute;bottom:0;left:0;right:0;padding:4px 6px;font-size:11px;
       background:linear-gradient(transparent,rgba(0,0,0,.8));color:#fff}
  .badge{display:inline-block;background:var(--accent);color:#06121f;border-radius:6px;padding:0 5px;
       font-size:10px;font-weight:700;margin-right:3px}
  .muted{color:var(--muted)} .spacer{flex:1}
  .vid{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:16px}
  .vid video{width:100%;border-radius:8px;background:#000}
  .vid .hd{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel2);
       border:1px solid var(--line);padding:10px 18px;border-radius:10px;box-shadow:0 6px 30px #0008;display:none}
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
  .pgrid figure{margin:0;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px}
  .pgrid img{width:100%;border-radius:6px;display:block}
  .pgrid figcaption{font-size:12px;color:var(--muted);margin-top:6px}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:4px 12px;font-size:12px}
  .spin{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--accent);
       border-radius:50%;animation:s .8s linear infinite;display:inline-block;vertical-align:-3px}
  @keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header>
  <h1>📸 Photo Memory</h1>
  <span class="stat" id="hstat">loading…</span>
  <nav>
    <button data-tab="browse" class="active">Browse</button>
    <button data-tab="videos">Videos</button>
    <button data-tab="people">People</button>
  </nav>
</header>
<main>
  <section id="browse">
    <div class="row">
      <select id="kind">
        <option value="month">Months</option>
        <option value="year">Years</option>
        <option value="trip">Trips</option>
        <option value="custom">Custom range</option>
      </select>
      <select id="year"></select>
      <span class="spacer"></span>
      <label class="muted">length&nbsp;<input type="number" id="len" value="90" min="20" max="600" style="width:70px"> s</label>
    </div>
    <div id="list" class="cards"></div>
  </section>

  <section id="preview" style="display:none">
    <div class="row">
      <button class="btn ghost" id="back">← Back</button>
      <h2 id="ptitle" style="margin:0"></h2>
      <span class="spacer"></span>
      <span class="muted" id="pcount"></span>
      <button class="btn ghost" id="fillBtn">Fill</button>
      <button class="btn ghost" id="addBtn">+ Add photos</button>
      <label class="muted"><input type="checkbox" id="music" checked> music</label>
      <select id="track" title="Music track"><option value="">🎵 Auto</option></select>
      <button class="btn ghost" id="playBtn" title="Preview track">▶</button>
      <audio id="audio" style="display:none"></audio>
      <button class="btn" id="renderBtn">Render selected</button>
    </div>
    <div class="muted" id="psub"></div>
    <div id="pgrid" class="grid"></div>
  </section>

  <section id="videos" style="display:none"></section>
  <section id="people" style="display:none"></section>
</main>
<div class="toast" id="toast"></div>

<script>
const $=s=>document.querySelector(s), api=(p,o)=>fetch(p,o).then(r=>r.json());
let curPreview=null;

function toast(msg,ms=2600){const t=$('#toast');t.innerHTML=msg;t.style.display='block';
  clearTimeout(t._t);if(ms)t._t=setTimeout(()=>t.style.display='none',ms);}

function tab(name){for(const s of ['browse','videos','people','preview'])$('#'+s).style.display='none';
  $('#'+name).style.display='';document.querySelectorAll('nav button').forEach(b=>
    b.classList.toggle('active',b.dataset.tab===name));}
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{tab(b.dataset.tab);
  if(b.dataset.tab==='videos')loadVideos();if(b.dataset.tab==='people')loadPeople();});

async function loadStats(){const s=await api('/api/stats');
  $('#hstat').textContent=`${s.total.toLocaleString()} photos · ${s.range[0]}–${s.range[1]} · ${s.people.length} people enrolled`;
  const y=$('#year');y.innerHTML='<option value="">All years</option>'+
    s.years.map(r=>`<option value="${r.year}">${r.year} (${r.count})</option>`).join('');
  if(s.years[0])y.value=s.years[0].year;
  window._people=s.people;
  const tracks=await api('/api/tracks');
  $('#track').innerHTML='<option value="">🎵 Auto</option>'+
    tracks.map(t=>`<option value="${esc(t)}">${esc(t.replace(/\.[^.]+$/,''))}</option>`).join('');
  loadList();}

(function(){const audio=$('#audio');
  $('#playBtn').onclick=()=>{const t=$('#track').value;
    if(!t){toast('“Auto” picks a track at random — choose one to preview');return;}
    if(!audio.paused && audio.dataset.t===t){audio.pause();$('#playBtn').textContent='▶';return;}
    audio.src='/api/track/'+encodeURIComponent(t);audio.dataset.t=t;audio.play();
    $('#playBtn').textContent='⏸';audio.onended=()=>$('#playBtn').textContent='▶';};
  $('#track').onchange=()=>{audio.pause();$('#playBtn').textContent='▶';};
})();

$('#kind').onchange=loadList; $('#year').onchange=loadList;
async function loadList(){
  const kind=$('#kind').value, year=$('#year').value, el=$('#list');
  el.innerHTML='<span class="muted">loading…</span>';
  if(kind==='year'){const s=await api('/api/stats');
    el.innerHTML=s.years.map(r=>card(`${r.year}`,`${r.count} photos`,'',()=>doPreview('year',`${r.year}`))).join('');
    bind(el,s.years.map(r=>()=>doPreview('year',`${r.year}`)));return;}
  if(kind==='month'){if(!year){el.innerHTML='<span class="muted">pick a year</span>';return;}
    const ms=await api('/api/months/'+year);
    el.innerHTML=ms.map(m=>card(m.label,`${m.count} photos`,m.highlights.join(' · '))).join('');
    bind(el,ms.map(m=>()=>doPreview('month',m.key)));return;}
  if(kind==='custom'){
    el.innerHTML=`<div class="card" style="cursor:default;max-width:560px">
      <h3>Custom memory (across months / locations)</h3>
      <div class="meta">Pick any date range — e.g. a multi-stop trip or a whole season.</div>
      <div class="row" style="margin-top:10px"><input id="cu_title" placeholder="Title, e.g. Asia 2024" style="flex:1"></div>
      <div class="row">from <input type="date" id="cu_start"> to <input type="date" id="cu_end"></div>
      <button class="btn" onclick="previewCustom()">Preview memory</button>
    </div>`; return;}
  if(kind==='trip'){const ts=await api('/api/trips'+(year?`?year=${year}`:''));
    if(!ts.length){el.innerHTML='<span class="muted">no trips detected</span>';return;}
    el.innerHTML=ts.map(t=>card(t.label,`${t.start} → ${t.end} · ${t.days}d · ${t.count} photos`,t.place||'')).join('');
    bind(el,ts.map(t=>()=>doPreview('trip',String(t.index),t.year)));return;}
}
function card(title,meta,hl){return `<div class="card"><h3>${esc(title)}</h3>
  <div class="meta">${esc(meta)}</div>${hl?`<div class="hl">${esc(hl)}</div>`:''}</div>`;}
function bind(el,fns){[...el.querySelectorAll('.card')].forEach((c,i)=>c.onclick=fns[i]);}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

async function poll(jid){for(;;){const j=await api('/api/jobs/'+jid);
  if(j.status==='done')return j.result; if(j.status==='error')throw new Error(j.error);
  await new Promise(r=>setTimeout(r,900));}}

async function doPreview(type,key,year,opts={}){
  tab('preview');$('#ptitle').textContent='Preparing…';$('#pgrid').innerHTML=
    '<div class="muted"><span class="spin"></span> scoring & selecting best photos…</div>';
  $('#psub').textContent='';$('#pcount').textContent='';
  try{
    const len=parseFloat($('#len').value)||90;
    const {job}=await api('/api/preview',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({type,key,year:year??null,length:len,...opts})});
    const r=await poll(job); curPreview={...r,type,key,year,...opts,excluded:new Set()};
    $('#ptitle').textContent=r.title;$('#psub').textContent=r.subtitle||'';
    $('#fillBtn').textContent='Fill to '+r.target;
    $('#pgrid').innerHTML=r.items.map(it=>tile(it,true)).join('');
    bindTiles(); updateCount();
  }catch(e){$('#pgrid').innerHTML=`<div style="color:var(--danger)">Error: ${esc(e.message)}</div>`;}
}
function tile(it,on){const ppl=(it.people||[]).map(p=>`<span class="badge">${esc(p)}</span>`).join('');
  return `<div class="tile${on?' on':''}" data-id="${it.media_id}">
    <img loading="lazy" src="/api/thumb/${it.media_id}">
    <div class="chk"></div>
    <div class="ppl">${ppl}${esc(it.date)}</div></div>`;}
function bindTiles(){[...$('#pgrid').children].forEach(t=>t.onclick=()=>{
  t.classList.toggle('on');
  const id=+t.dataset.id;
  if(curPreview&&curPreview.excluded){t.classList.contains('on')?curPreview.excluded.delete(id):curPreview.excluded.add(id);}
  updateCount();});}
function updateCount(){const on=$('#pgrid').querySelectorAll('.tile.on').length,
  all=$('#pgrid').querySelectorAll('.tile').length;
  $('#pcount').textContent=`${on}/${all} selected`;}
$('#back').onclick=()=>{tab('browse');};

function previewCustom(){
  const title=$('#cu_title').value.trim(), start=$('#cu_start').value, end=$('#cu_end').value;
  if(!start||!end){toast('Pick a start and end date');return;}
  if(start>end){toast('Start date must be before end date');return;}
  doPreview('custom','',null,{start,end,title});
}

$('#addBtn').onclick=async()=>{
  if(!curPreview)return;
  const btn=$('#addBtn');btn.disabled=true;const old=btn.textContent;btn.textContent='Loading…';
  try{
    const q=new URLSearchParams({type:curPreview.type,key:curPreview.key||''});
    if(curPreview.year!=null)q.set('year',curPreview.year);
    if(curPreview.start)q.set('start',curPreview.start);
    if(curPreview.end)q.set('end',curPreview.end);
    const pool=await api('/api/period_media?'+q);
    const have=new Set([...$('#pgrid').querySelectorAll('.tile')].map(t=>+t.dataset.id));
    const add=pool.filter(p=>!have.has(p.media_id));
    if(!add.length){toast('No more photos in this period');btn.textContent=old;btn.disabled=false;return;}
    $('#pgrid').insertAdjacentHTML('beforeend',add.map(it=>tile(it,false)).join(''));
    bindTiles();updateCount();
    toast(`Added ${add.length} more photos — click to include them`);
  }catch(e){toast('❌ '+esc(e.message),4000);}
  finally{btn.textContent=old;btn.disabled=false;}
};

$('#fillBtn').onclick=()=>{
  if(!curPreview)return;
  const target=curPreview.target;
  const onSet=new Set([...$('#pgrid').querySelectorAll('.tile.on')].map(t=>+t.dataset.id));
  if(onSet.size>=target){toast('Already at '+target+' photos');return;}
  const tiles=new Map([...$('#pgrid').querySelectorAll('.tile')].map(t=>[+t.dataset.id,t]));
  for(const it of (curPreview.extras||[])){
    if(onSet.size>=target)break;
    if(onSet.has(it.media_id))continue;
    if(curPreview.excluded&&curPreview.excluded.has(it.media_id))continue; // don't re-add removed
    const t=tiles.get(it.media_id);
    if(t)t.classList.add('on');
    else $('#pgrid').insertAdjacentHTML('beforeend',tile(it,true));
    onSet.add(it.media_id);
  }
  bindTiles();updateCount();
  toast(onSet.size<target?`Filled to ${onSet.size} (no more next-best left)`:`Filled back to ${target}`);
};

$('#renderBtn').onclick=async()=>{
  if(!curPreview)return;
  const ids=[...$('#pgrid').querySelectorAll('.tile.on')].map(t=>+t.dataset.id);
  if(!ids.length){toast('Select at least one photo');return;}
  $('#renderBtn').disabled=true;toast('<span class="spin"></span> Rendering video…',0);
  try{
    const {job}=await api('/api/render',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({title:curPreview.title,subtitle:curPreview.subtitle,
        media_ids:ids,music:$('#music').checked,track:$('#track').value||null})});
    const r=await poll(job);
    toast('✅ Rendered '+r.video);tab('videos');loadVideos();
  }catch(e){toast('❌ '+esc(e.message),5000);}
  finally{$('#renderBtn').disabled=false;}
};

async function loadVideos(){const el=$('#videos');const vs=await api('/api/videos');
  if(!vs.length){el.innerHTML='<p class="muted">No videos yet — build one from the Browse tab.</p>';return;}
  el.innerHTML=vs.map(v=>`<div class="vid"><div class="hd"><b>${esc(v.name)}</b>
    <span class="muted">${v.size_mb} MB</span><span class="spacer"></span>
    <a class="btn ghost" href="/media/${encodeURIComponent(v.name)}" download>Download</a></div>
    <video controls preload="metadata" src="/media/${encodeURIComponent(v.name)}"></video></div>`).join('');}

function postJSON(p,b){return fetch(p,{method:'POST',headers:{'Content-Type':'application/json'},
  body:JSON.stringify(b)}).then(r=>r.json());}
async function jobToast(job,label){toast(`<span class="spin"></span> ${label}…`,0);
  try{const r=await poll(job);toast('✅ '+label+' done');return r;}
  catch(e){toast('❌ '+esc(e.message),5000);throw e;}}

async function loadPeople(){
  const el=$('#people'); const s=await api('/api/stats');
  const rows=s.people.map(p=>`<tr>
      <td><b>${esc(p.name)}</b> <span class="muted">· ${p.faces} faces</span></td>
      <td>birthday <input type="date" value="${p.birthdate||''}" id="bd_${esc(p.name)}" style="width:150px"></td>
      <td>until <input type="date" value="${p.until||''}" id="lf_${esc(p.name)}" style="width:150px"></td>
      <td><button class="btn ghost" onclick="savePerson('${esc(p.name)}')">Save dates</button></td>
    </tr>`).join('')||'<tr><td class="muted">none enrolled yet</td></tr>';

  const ms=await api('/api/faces/clusters');
  const tiles=ms.map(c=>`<figure>
      <img loading="lazy" src="/api/montage/${encodeURIComponent(c.file)}?t=${Date.now()}">
      <figcaption>cluster #${c.cluster} · ${c.size} faces</figcaption>
      <div class="row" style="margin:6px 0 0">
        <input placeholder="name…" id="cl_${c.cluster}" style="flex:1;min-width:80px">
        <button class="btn" onclick="labelCluster(${c.cluster})">Label</button>
        <button class="btn ghost" onclick="splitCluster(${c.cluster})">Split</button>
      </div></figure>`).join('')||'<span class="muted">no clusters — run Extract then Cluster below</span>';

  el.innerHTML=`
    <h2>Enrolled people</h2>
    <table style="border-collapse:collapse;width:100%"><tbody>${rows}</tbody></table>

    <h2 style="margin-top:24px">Enroll from reference photos</h2>
    <p class="muted">Best for people clustering can't separate. Paste folder(s) or file path(s), one per line.
      Picks the dominant recurring face; shows a montage to verify.</p>
    <div class="row">
      <input id="en_name" placeholder="person name" style="width:160px">
      <label class="muted"><input type="checkbox" id="en_add" checked> add to existing</label>
      <button class="btn" onclick="enrollPhotos()">Enroll</button>
    </div>
    <textarea id="en_paths" rows="3" placeholder="Z:\\Triees\\2022\\20221001 Portrait Julien&#10;Z:\\...\\IMG_4197.JPG"
      style="width:100%;background:var(--panel2);color:var(--fg);border:1px solid var(--line);border-radius:8px;padding:8px"></textarea>
    <div id="en_result"></div>

    <h2 style="margin-top:24px">Build / refine face index</h2>
    <div class="row">
      <label class="muted">sample <input type="number" id="ex_n" value="4000" style="width:90px"></label>
      <button class="btn ghost" onclick="runExtract()">Extract faces</button>
      <span style="width:14px"></span>
      <label class="muted">eps <input type="number" id="cl_eps" value="0.30" step="0.02" style="width:80px"></label>
      <button class="btn ghost" onclick="runCluster()">Cluster</button>
    </div>

    <h2 style="margin-top:24px">Clusters to label</h2>
    <div class="pgrid">${tiles}</div>`;
}
async function savePerson(name){
  const bd=$('#bd_'+CSS.escape(name)).value, lf=$('#lf_'+CSS.escape(name)).value;
  if(bd)await postJSON('/api/faces/birthday',{name,date:bd});
  if(lf)await postJSON('/api/faces/lifespan',{name,until:lf});
  toast('✅ Saved dates for '+esc(name));}
async function labelCluster(cl){const name=$('#cl_'+cl).value.trim();
  if(!name){toast('Enter a name');return;}
  const r=await postJSON('/api/faces/label',{cluster:cl,name});
  toast(`✅ Labeled ${r.labeled} faces as ${esc(name)}`);loadPeople();}
async function splitCluster(cl){const {job}=await postJSON('/api/faces/split',{cluster:cl});
  await jobToast(job,`Splitting cluster #${cl}`);loadPeople();}
async function enrollPhotos(){
  const name=$('#en_name').value.trim();
  const paths=$('#en_paths').value.split('\n').map(s=>s.trim()).filter(Boolean);
  if(!name||!paths.length){toast('Enter a name and at least one path');return;}
  const {job}=await postJSON('/api/faces/enroll',{name,paths,add:$('#en_add').checked});
  try{const r=await jobToast(job,`Enrolling ${name}`);
    $('#en_result').innerHTML=r.added?`<p>Added ${r.added} faces. Verify:</p>
      <img src="/api/montage/${encodeURIComponent(r.montage)}?t=${Date.now()}" style="max-width:480px;border-radius:8px">`
      :'<p style="color:var(--danger)">No faces found in those photos.</p>';
    loadStats();}catch(e){}}
async function runExtract(){const n=+$('#ex_n').value||4000;
  const {job}=await postJSON('/api/faces/extract',{sample:n});
  await jobToast(job,`Extracting faces from ${n} photos`);}
async function runCluster(){const eps=+$('#cl_eps').value||0.30;
  const {job}=await postJSON('/api/faces/cluster',{eps});
  await jobToast(job,'Clustering faces');loadPeople();}

loadStats();
</script>
</body>
</html>

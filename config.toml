# Photo Memory Generator — user-editable configuration.
# Any value here overrides the defaults in photomemory/config.py.

[paths]
# Roots to scan. Each entry: a label and a directory.
# The "triees" root uses folder names for dates/titles (YYYYMMDD / YYYY_MM_DD).
# The "amazon" root uses filename dates (YYYY-MM-DD_HH-MM-SS).
roots = [
    { name = "triees", path = "Z:\\Triees", layout = "foldername" },
    { name = "amazon", path = "Z:\\Amazon Photos Downloads", layout = "filename" },
]

# Local storage (keep OFF the NAS for speed).
db_path = "data/catalog.db"
output_dir = "output"
cache_dir = "data/cache"          # downscaled frames cached for scoring/render

[scan]
workers = 16                      # parallel I/O workers (tune for your SMB link)
read_exif_gps = true             # attempt EXIF read per image for GPS + date fallback
image_exts = [".jpg", ".jpeg", ".png", ".heic", ".heif", ".tif", ".tiff"]
video_exts = [".mp4", ".mov", ".m4v"]

[scoring]
# Composite weights (normalized 0..1 each). Tune to taste.
w_sharpness = 0.30
w_exposure  = 0.15
w_aesthetic = 0.40
w_faces     = 0.15
use_ml = true                     # use NIMA aesthetic + face detection if available
face_bonus_cap = 3                # diminishing returns past N faces
w_family = 0.6                    # strong boost for photos featuring enrolled family members

[grouping]
trip_max_gap_days = 1            # consecutive dates within this gap stay in one trip
trip_min_span_days = 2          # a trip must span at least this many days
home_radius_km = 50             # GPS within this of "home" is not a trip on its own

[home]
# Optional: your home location, used so local multi-day stretches aren't flagged as trips.
# Leave both commented out to auto-estimate home as the densest GPS cluster.
# lat = 48.85
# lon = 2.35

[render]
width = 1920
height = 1080
fps = 30
seconds_per_photo = 3.0
transition_seconds = 0.6
default_length_seconds = 90
ken_burns_zoom = 0.04        # gentle motion; whole photo fits with a blurred fill behind
music = true
